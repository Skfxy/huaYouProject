<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a1a" />
    <meta
      name="description"
      content="话游 - 交互式叙事人生模拟游戏，一话一人生，一言一世界"
    />
    <title>话游 - 交互式叙事人生模拟</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          135deg,
          #0a0a1a 0%,
          #1a1a3a 50%,
          #0a0a2a 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        font-family:
          "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 72px;
        font-weight: 900;
        letter-spacing: 8px;
        background: linear-gradient(180deg, #ffffff 0%, #c0c8d4 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.8));
        margin-bottom: 24px;
        animation: loadingPulse 2s ease-in-out infinite;
      }
      .loading-subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 4px;
        margin-bottom: 48px;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(79, 195, 247, 0.2);
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text {
        margin-top: 16px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 2px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes loadingPulse {
        0%,
        100% {
          opacity: 0.8;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.02);
        }
      }
      @media (max-width: 768px) {
        .loading-title {
          font-size: 48px;
          letter-spacing: 4px;
        }
        .loading-subtitle {
          font-size: 12px;
          letter-spacing: 2px;
        }
      }
      @media (max-width: 480px) {
        .loading-title {
          font-size: 36px;
          letter-spacing: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div class="loading-title">话游</div>
        <div class="loading-subtitle">交互式叙事人生模拟</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
